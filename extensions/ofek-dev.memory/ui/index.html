<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Memory</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #0b0e14;
        --surface: #12161f;
        --line: rgba(255, 255, 255, 0.09);
        --text: #e7eaf0;
        --muted: #9aa3b4;
        --accent: #7b68ee;
        --danger: #e5484d;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--ink); color: var(--text); }
      main { max-width: 900px; margin: 0 auto; padding: 24px 20px 48px; }
      h1 { font-size: 20px; margin: 0 0 4px; }
      p.hint { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
      .scope-group { margin-bottom: 28px; }
      .scope-group__title {
        font-size: 13px;
        font-weight: 700;
        color: var(--accent);
        margin-bottom: 8px;
        overflow-wrap: anywhere;
      }
      .memory-row {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 12px;
        margin-bottom: 8px;
      }
      .memory-row__head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        cursor: pointer;
      }
      .memory-row__name { font-weight: 600; }
      .memory-row__desc { color: var(--muted); font-size: 12px; margin-top: 2px; }
      .memory-row__type {
        font-size: 11px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 2px 8px;
        color: var(--muted);
      }
      .memory-row__edit { margin-top: 10px; display: none; flex-direction: column; gap: 8px; }
      .memory-row__edit.open { display: flex; }
      .memory-row__edit input,
      .memory-row__edit select,
      .memory-row__edit textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 7px 8px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #1a1a1a;
        color: var(--text);
        font-size: 12px;
      }
      .memory-row__edit textarea { min-height: 140px; font-family: ui-monospace, monospace; resize: vertical; }
      .memory-row__actions { display: flex; gap: 8px; justify-content: flex-end; }
      button {
        padding: 6px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: transparent;
        color: var(--text);
        cursor: pointer;
        font-size: 12px;
      }
      button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
      button.danger { border-color: var(--danger); color: var(--danger); }
      #status { font-size: 12px; color: var(--muted); margin-bottom: 12px; min-height: 16px; }
      #empty { color: var(--muted); font-size: 13px; }
    </style>
  </head>
  <body>
    <main>
      <h1>Memory</h1>
      <p class="hint">Every memory an agent has proposed and you approved, plus any you added yourself. Edits and deletes here take effect immediately -- no approval needed for your own changes.</p>
      <div id="status"></div>
      <div id="root"></div>
    </main>
    <script type="module">
      const statusEl = document.getElementById("status");
      const rootEl = document.getElementById("root");

      function scopeTitle(scope) {
        if (scope.type === "global") return "Global";
        return `${scope.type === "project" ? "Project" : "Folder"}: ${scope.path}`;
      }

      function memoryRow(scope, memory) {
        const row = document.createElement("div");
        row.className = "memory-row";

        const head = document.createElement("div");
        head.className = "memory-row__head";
        const left = document.createElement("div");
        const name = document.createElement("div");
        name.className = "memory-row__name";
        name.textContent = memory.name;
        const desc = document.createElement("div");
        desc.className = "memory-row__desc";
        desc.textContent = memory.description;
        left.append(name, desc);
        const type = document.createElement("span");
        type.className = "memory-row__type";
        type.textContent = memory.type;
        head.append(left, type);
        row.appendChild(head);

        const edit = document.createElement("div");
        edit.className = "memory-row__edit";

        const descInput = document.createElement("input");
        descInput.value = memory.description;
        const typeSelect = document.createElement("select");
        for (const t of ["user", "feedback", "project", "reference"]) {
          const opt = document.createElement("option");
          opt.value = t;
          opt.textContent = t;
          opt.selected = t === memory.type;
          typeSelect.appendChild(opt);
        }
        const contentArea = document.createElement("textarea");
        contentArea.value = memory.content;

        const actions = document.createElement("div");
        actions.className = "memory-row__actions";
        const deleteBtn = document.createElement("button");
        deleteBtn.className = "danger";
        deleteBtn.textContent = "Delete";
        deleteBtn.addEventListener("click", async () => {
          if (!confirm(`Delete memory "${memory.name}"?`)) return;
          statusEl.textContent = "Deleting…";
          const res = await fetch(
            `/api/memory/${encodeURIComponent(scope.type)}/${encodeURIComponent(memory.name)}?scope_path=${encodeURIComponent(scope.path)}`,
            { method: "DELETE", credentials: "include" },
          );
          statusEl.textContent = res.ok ? "" : "Delete failed.";
          if (res.ok) await load();
        });
        const saveBtn = document.createElement("button");
        saveBtn.className = "primary";
        saveBtn.textContent = "Save";
        saveBtn.addEventListener("click", async () => {
          statusEl.textContent = "Saving…";
          const res = await fetch(`/api/memory/${encodeURIComponent(scope.type)}/${encodeURIComponent(memory.name)}`, {
            method: "PUT",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              scope_path: scope.path,
              description: descInput.value,
              type: typeSelect.value,
              content: contentArea.value,
            }),
          });
          statusEl.textContent = res.ok ? "" : "Save failed.";
          if (res.ok) await load();
        });
        actions.append(deleteBtn, saveBtn);
        edit.append(descInput, typeSelect, contentArea, actions);
        row.appendChild(edit);

        head.addEventListener("click", () => edit.classList.toggle("open"));
        return row;
      }

      function render(data) {
        rootEl.replaceChildren();
        const groups = [{ type: "global", path: "", memories: data.global || [] }, ...(data.scopes || [])];
        const nonEmpty = groups.filter((g) => (g.memories || []).length > 0);
        if (nonEmpty.length === 0) {
          const empty = document.createElement("div");
          empty.id = "empty";
          empty.textContent = "No memories yet.";
          rootEl.appendChild(empty);
          return;
        }
        for (const scope of nonEmpty) {
          const group = document.createElement("div");
          group.className = "scope-group";
          const title = document.createElement("div");
          title.className = "scope-group__title";
          title.textContent = scopeTitle(scope);
          group.appendChild(title);
          for (const memory of scope.memories) {
            group.appendChild(memoryRow(scope, memory));
          }
          rootEl.appendChild(group);
        }
      }

      async function load() {
        statusEl.textContent = "Loading…";
        try {
          const res = await fetch("/api/memory/all", { credentials: "include" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          statusEl.textContent = "";
          render(data);
        } catch (err) {
          statusEl.textContent = `Failed to load memories: ${err}`;
        }
      }

      load();
    </script>
  </body>
</html>
