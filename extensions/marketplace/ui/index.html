<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Better Agent Marketplace</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111318;
        color: #f3f4f6;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #111318;
      }
      [hidden] { display: none !important; }
      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }
      h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 760;
      }
      button {
        border: 1px solid #343844;
        border-radius: 8px;
        background: #20242d;
        color: #f3f4f6;
        min-height: 36px;
        padding: 0 14px;
        cursor: pointer;
        transition: background-color 160ms ease, border-color 160ms ease, opacity 160ms ease, transform 160ms ease;
      }
      button:hover:not(:disabled) { transform: translateY(-1px); }
      button.primary {
        background: #5b6ee1;
        border-color: #6f7feb;
      }
      button:disabled {
        opacity: 0.55;
        cursor: default;
      }
      .status {
        min-height: 24px;
        color: #aeb4c2;
        margin-bottom: 12px;
      }
      .grid {
        display: grid;
        gap: 12px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        border: 1px solid #252936;
        border-radius: 8px;
        background: #171a21;
        padding: 16px;
        animation: marketplace-enter 220ms ease both;
      }
      h2 {
        margin: 0 0 6px;
        font-size: 17px;
      }
      p {
        margin: 0;
        color: #aeb4c2;
        line-height: 1.45;
      }
      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .meta span {
        border: 1px solid #303542;
        border-radius: 999px;
        padding: 3px 8px;
        color: #cbd0dc;
        font-size: 12px;
      }
      .actions {
        display: flex;
        gap: 8px;
      }
      .account-gate {
        display: grid;
        gap: 12px;
        border: 1px solid #252936;
        border-radius: 8px;
        background: #171a21;
        padding: 16px;
        margin-bottom: 16px;
        animation: marketplace-enter 220ms ease both;
      }
      .provider-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .token {
        width: min(360px, 100%);
        box-sizing: border-box;
        border: 1px solid #343844;
        border-radius: 8px;
        min-height: 36px;
        padding: 0 10px;
        background: #101218;
        color: #f3f4f6;
      }
      @media (max-width: 720px) {
        header,
        .row {
          grid-template-columns: 1fr;
          align-items: stretch;
        }
        header {
          display: grid;
        }
        .actions {
          justify-content: flex-start;
          flex-wrap: wrap;
        }
      }
      @keyframes marketplace-enter {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Marketplace</h1>
        <button id="refresh" type="button" disabled>Refresh</button>
      </header>
      <section id="accountGate" class="account-gate" hidden>
        <p>Sign in to browse and install marketplace extensions.</p>
        <div id="providerActions" class="provider-actions"></div>
      </section>
      <button id="marketplaceLogout" type="button" hidden>Sign out</button>
      <div id="status" class="status"></div>
      <div id="grid" class="grid"></div>
    </main>
    <script type="module">
      const statusEl = document.getElementById("status");
      const gridEl = document.getElementById("grid");
      const refreshEl = document.getElementById("refresh");
      const accountGateEl = document.getElementById("accountGate");
      const providerActionsEl = document.getElementById("providerActions");
      const marketplaceLogoutEl = document.getElementById("marketplaceLogout");
      let busyId = "";
      let bridgeNonce = "";
      const pendingRequests = new Map();

      async function requestJson(url, options = {}) {
        if (!bridgeNonce) throw new Error("Marketplace connection is not ready");
        const requestId = crypto.randomUUID();
        const body = typeof options.body === "string" ? JSON.parse(options.body) : options.body;
        const result = new Promise((resolve, reject) => {
          pendingRequests.set(requestId, { resolve, reject });
        });
        window.parent.postMessage({
          source: "ba-extension",
          nonce: bridgeNonce,
          action: "marketplace-request",
          requestId,
          path: url,
          method: options.method || "GET",
          body,
        }, "*");
        return result;
      }

      function installedById(records) {
        const map = new Map();
        for (const record of records) {
          const id = record?.manifest?.id;
          if (id) map.set(id, record);
        }
        return map;
      }

      function describeStatus(record) {
        if (!record) return "Available";
        return record.enabled ? "Installed" : "Disabled";
      }

      function renderAccountGate(providers) {
        providerActionsEl.replaceChildren();
        for (const provider of providers) {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = `Continue with ${provider.label}`;
          button.addEventListener("click", () => {
            if (!bridgeNonce) return;
            statusEl.textContent = `Opening ${provider.label} sign-in...`;
            window.parent.postMessage({
              source: "ba-extension",
              nonce: bridgeNonce,
              action: "marketplace-auth-start",
              requestId: crypto.randomUUID(),
              provider: provider.id,
            }, "*");
          });
          providerActionsEl.appendChild(button);
        }
      }

      function render(catalog, installed) {
        const installedMap = installedById(installed);
        gridEl.replaceChildren();
        for (const item of catalog) {
          const record = installedMap.get(item.id);
          const row = document.createElement("article");
          row.className = "row";
          const info = document.createElement("div");
          const title = document.createElement("h2");
          title.textContent = item.name || item.id;
          const description = document.createElement("p");
          description.textContent = item.description || item.id;
          const meta = document.createElement("div");
          meta.className = "meta";
          for (const value of [
            item.version,
            describeStatus(record),
            item.marketplace?.subscription_required ? "Subscription" : "Included",
            ...(item.surfaces || []),
          ].filter(Boolean)) {
            const pill = document.createElement("span");
            pill.textContent = value;
            meta.appendChild(pill);
          }
          info.append(title, description, meta);
          const actions = document.createElement("div");
          actions.className = "actions";
          if (item.marketplace?.subscription_required && !record) {
            const token = document.createElement("input");
            token.className = "token";
            token.type = "password";
            token.placeholder = "Entitlement token";
            token.autocomplete = "off";
            actions.appendChild(token);
          }
          const button = document.createElement("button");
          button.type = "button";
          button.className = record ? "" : "primary";
          button.disabled = busyId === item.id || item.id === "ofek-dev.marketplace";
          button.textContent = record ? (record.enabled ? "Disable" : "Enable") : "Install";
          button.addEventListener("click", () => {
            if (record) {
              void setEnabled(item.id, !record.enabled);
              return;
            }
            const token = actions.querySelector("input")?.value || "";
            void install(item, token);
          });
          actions.appendChild(button);
          if (record && item.id !== "ofek-dev.marketplace") {
            const uninstallButton = document.createElement("button");
            uninstallButton.type = "button";
            uninstallButton.disabled = busyId === item.id;
            uninstallButton.textContent = "Uninstall";
            uninstallButton.addEventListener("click", () => {
              void uninstall(item);
            });
            actions.appendChild(uninstallButton);
          }
          row.append(info, actions);
          gridEl.appendChild(row);
        }
      }

      async function load() {
        statusEl.textContent = "Loading...";
        let installed = [];
        try {
          const [authPayload, authStatus, installedPayload] = await Promise.all([
            requestJson("/api/extensions/ofek-dev.marketplace/backend/auth/providers"),
            requestJson("/api/extensions/ofek-dev.marketplace/backend/auth/status"),
            requestJson("/api/extensions"),
          ]);
          installed = installedPayload.extensions || [];
          renderAccountGate(authPayload.providers || []);
          accountGateEl.hidden = authStatus.authenticated === true;
          marketplaceLogoutEl.hidden = authStatus.authenticated !== true;
          if (authStatus.authenticated !== true) {
            render([], installed);
            statusEl.textContent = "Sign in with Google or GitHub to continue.";
            return;
          }
          const catalogPayload = await requestJson("/api/extensions/ofek-dev.marketplace/backend/catalog");
          render(catalogPayload.extensions || [], installed);
          statusEl.textContent = "";
        } catch (error) {
          render([], installed);
          accountGateEl.hidden = false;
          marketplaceLogoutEl.hidden = true;
          statusEl.textContent = error instanceof Error ? error.message : "Marketplace catalog failed";
        }
      }

      async function install(item, entitlementToken) {
        busyId = item.id;
        statusEl.textContent = `Installing ${item.name || item.id}...`;
        try {
          const installSpec = item.install || {};
          let payload = {
            repo_url: installSpec.repo_url || "",
            extension_path: installSpec.extension_path || "",
            ref: installSpec.ref || "",
            entitlement_token: entitlementToken,
          };
          if (installSpec.metadata_url) {
            const metadata = await requestJson(installSpec.metadata_url);
            payload = {
              ...payload,
              artifact_url: metadata.artifact_url || "",
              artifact_sha256: metadata.artifact_sha256 || "",
              artifact_signature: metadata.signature || "",
            };
          }
          await requestJson("/api/extensions/install", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          await load();
        } catch (error) {
          statusEl.textContent = error instanceof Error ? error.message : "Install failed";
        } finally {
          busyId = "";
        }
      }

      async function setEnabled(id, enabled) {
        busyId = id;
        statusEl.textContent = "Updating...";
        try {
          await requestJson(`/api/extensions/${encodeURIComponent(id)}/enabled`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ enabled }),
          });
          await load();
        } catch (error) {
          statusEl.textContent = error instanceof Error ? error.message : "Update failed";
        } finally {
          busyId = "";
        }
      }

      async function uninstall(item) {
        busyId = item.id;
        statusEl.textContent = `Uninstalling ${item.name || item.id}...`;
        try {
          await requestJson(`/api/extensions/ofek-dev.marketplace/backend/extensions/${encodeURIComponent(item.id)}/uninstall`, {
            method: "POST",
          });
          await requestJson(`/api/extensions/${encodeURIComponent(item.id)}`, {
            method: "DELETE",
          });
          await load();
        } catch (error) {
          statusEl.textContent = error instanceof Error ? error.message : "Uninstall failed";
        } finally {
          busyId = "";
        }
      }

      refreshEl.addEventListener("click", () => {
        void load();
      });
      marketplaceLogoutEl.addEventListener("click", async () => {
        statusEl.textContent = "Signing out...";
        await requestJson("/api/extensions/ofek-dev.marketplace/backend/auth/logout", { method: "POST" });
        await load();
      });
      window.addEventListener("message", (event) => {
        if (event.source !== window.parent || event.data?.source !== "ba-core") return;
        if (event.data.action === "marketplace-auth-init" && typeof event.data.nonce === "string") {
          bridgeNonce = event.data.nonce;
          refreshEl.disabled = false;
          void load();
          return;
        }
        if (event.data.nonce === bridgeNonce && event.data.action === "marketplace-response") {
          const pending = pendingRequests.get(event.data.requestId);
          if (!pending) return;
          pendingRequests.delete(event.data.requestId);
          if (event.data.ok) pending.resolve(event.data.payload);
          else pending.reject(new Error(event.data.error || "Marketplace request failed"));
          return;
        }
        if (event.data.nonce !== bridgeNonce || event.data.action !== "marketplace-auth-result") return;
        statusEl.textContent = event.data.status === "cancelled" ? "Sign-in cancelled." : "Sign-in complete.";
        if (event.data.status === "authenticated") void load();
      });
    </script>
  </body>
</html>
