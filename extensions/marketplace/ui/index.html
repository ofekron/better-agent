<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Better Agent Marketplace</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111318;
        color: #f3f4f6;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #111318;
      }
      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }
      h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 760;
      }
      button {
        border: 1px solid #343844;
        border-radius: 8px;
        background: #20242d;
        color: #f3f4f6;
        min-height: 36px;
        padding: 0 14px;
        cursor: pointer;
      }
      button.primary {
        background: #5b6ee1;
        border-color: #6f7feb;
      }
      button:disabled {
        opacity: 0.55;
        cursor: default;
      }
      .status {
        min-height: 24px;
        color: #aeb4c2;
        margin-bottom: 12px;
      }
      .grid {
        display: grid;
        gap: 12px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        border: 1px solid #252936;
        border-radius: 8px;
        background: #171a21;
        padding: 16px;
      }
      h2 {
        margin: 0 0 6px;
        font-size: 17px;
      }
      p {
        margin: 0;
        color: #aeb4c2;
        line-height: 1.45;
      }
      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .meta span {
        border: 1px solid #303542;
        border-radius: 999px;
        padding: 3px 8px;
        color: #cbd0dc;
        font-size: 12px;
      }
      .actions {
        display: flex;
        gap: 8px;
      }
      .account-gate {
        display: grid;
        gap: 12px;
        border: 1px solid #252936;
        border-radius: 8px;
        background: #171a21;
        padding: 16px;
        margin-bottom: 16px;
      }
      .provider-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .account-token-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }
      .token {
        width: min(360px, 100%);
        box-sizing: border-box;
        border: 1px solid #343844;
        border-radius: 8px;
        min-height: 36px;
        padding: 0 10px;
        background: #101218;
        color: #f3f4f6;
      }
      @media (max-width: 720px) {
        header,
        .row {
          grid-template-columns: 1fr;
          align-items: stretch;
        }
        header {
          display: grid;
        }
        .actions {
          justify-content: flex-start;
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Marketplace</h1>
        <button id="refresh" type="button">Refresh</button>
      </header>
      <section id="accountGate" class="account-gate" hidden>
        <p>Sign in to browse and install marketplace extensions.</p>
        <div id="providerActions" class="provider-actions"></div>
        <div class="account-token-row">
          <input id="marketplaceToken" class="token" type="password" autocomplete="off" placeholder="Marketplace access token" />
          <button id="saveMarketplaceToken" type="button">Save token</button>
          <button id="clearMarketplaceToken" type="button">Clear</button>
        </div>
      </section>
      <div id="status" class="status"></div>
      <div id="grid" class="grid"></div>
    </main>
    <script type="module">
      const statusEl = document.getElementById("status");
      const gridEl = document.getElementById("grid");
      const refreshEl = document.getElementById("refresh");
      const accountGateEl = document.getElementById("accountGate");
      const providerActionsEl = document.getElementById("providerActions");
      const marketplaceTokenEl = document.getElementById("marketplaceToken");
      const saveMarketplaceTokenEl = document.getElementById("saveMarketplaceToken");
      const clearMarketplaceTokenEl = document.getElementById("clearMarketplaceToken");
      const marketplaceTokenKey = "better-agent.marketplace.accessToken";
      let busyId = "";

      function marketplaceToken() {
        return window.localStorage.getItem(marketplaceTokenKey) || "";
      }

      function marketplaceHeaders(options) {
        const token = marketplaceToken();
        const headers = new Headers(options.headers || {});
        if (token && !headers.has("authorization")) headers.set("Authorization", `Bearer ${token}`);
        return headers;
      }

      async function requestJson(url, options = {}, includeMarketplaceToken = false) {
        const response = await fetch(url, {
          credentials: "include",
          ...options,
          headers: includeMarketplaceToken ? marketplaceHeaders(options) : options.headers,
        });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
      }

      function installedById(records) {
        const map = new Map();
        for (const record of records) {
          const id = record?.manifest?.id;
          if (id) map.set(id, record);
        }
        return map;
      }

      function describeStatus(record) {
        if (!record) return "Available";
        return record.enabled ? "Installed" : "Disabled";
      }

      function renderAccountGate(providers) {
        providerActionsEl.replaceChildren();
        marketplaceTokenEl.value = marketplaceToken();
        for (const provider of providers) {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = `Continue with ${provider.label}`;
          button.addEventListener("click", () => {
            window.open(provider.login_url, "_blank", "noopener,noreferrer");
          });
          providerActionsEl.appendChild(button);
        }
        accountGateEl.hidden = Boolean(marketplaceToken());
      }

      function render(catalog, installed) {
        const installedMap = installedById(installed);
        gridEl.replaceChildren();
        for (const item of catalog) {
          const record = installedMap.get(item.id);
          const row = document.createElement("article");
          row.className = "row";
          const info = document.createElement("div");
          const title = document.createElement("h2");
          title.textContent = item.name || item.id;
          const description = document.createElement("p");
          description.textContent = item.description || item.id;
          const meta = document.createElement("div");
          meta.className = "meta";
          for (const value of [
            item.version,
            describeStatus(record),
            item.marketplace?.subscription_required ? "Subscription" : "Included",
            ...(item.surfaces || []),
          ].filter(Boolean)) {
            const pill = document.createElement("span");
            pill.textContent = value;
            meta.appendChild(pill);
          }
          info.append(title, description, meta);
          const actions = document.createElement("div");
          actions.className = "actions";
          if (item.marketplace?.subscription_required && !record) {
            const token = document.createElement("input");
            token.className = "token";
            token.type = "password";
            token.placeholder = "Entitlement token";
            token.autocomplete = "off";
            actions.appendChild(token);
          }
          const button = document.createElement("button");
          button.type = "button";
          button.className = record ? "" : "primary";
          button.disabled = busyId === item.id || item.id === "ofek-dev.marketplace";
          button.textContent = record ? (record.enabled ? "Disable" : "Enable") : "Install";
          button.addEventListener("click", () => {
            if (record) {
              void setEnabled(item.id, !record.enabled);
              return;
            }
            const token = actions.querySelector("input")?.value || "";
            void install(item, token);
          });
          actions.appendChild(button);
          if (record && item.id !== "ofek-dev.marketplace") {
            const uninstallButton = document.createElement("button");
            uninstallButton.type = "button";
            uninstallButton.disabled = busyId === item.id;
            uninstallButton.textContent = "Uninstall";
            uninstallButton.addEventListener("click", () => {
              void uninstall(item);
            });
            actions.appendChild(uninstallButton);
          }
          row.append(info, actions);
          gridEl.appendChild(row);
        }
      }

      async function load() {
        statusEl.textContent = "Loading...";
        const [authPayload, installedPayload] = await Promise.all([
          requestJson("/api/extensions/ofek-dev.marketplace/backend/auth/providers"),
          requestJson("/api/extensions"),
        ]);
        renderAccountGate(authPayload.providers || []);
        if (!marketplaceToken()) {
          render([], installedPayload.extensions || []);
          statusEl.textContent = "Sign in to the marketplace, copy the access token, then save it here.";
          return;
        }
        try {
          const catalogPayload = await requestJson(
            "/api/extensions/ofek-dev.marketplace/backend/catalog",
            {},
            true,
          );
          render(catalogPayload.extensions || [], installedPayload.extensions || []);
          statusEl.textContent = "";
        } catch (error) {
          render([], installedPayload.extensions || []);
          accountGateEl.hidden = false;
          statusEl.textContent = error instanceof Error ? error.message : "Marketplace catalog failed";
        }
      }

      async function install(item, entitlementToken) {
        busyId = item.id;
        statusEl.textContent = `Installing ${item.name || item.id}...`;
        try {
          const installSpec = item.install || {};
          let payload = {
            repo_url: installSpec.repo_url || "",
            extension_path: installSpec.extension_path || "",
            ref: installSpec.ref || "",
            entitlement_token: entitlementToken,
          };
          if (installSpec.metadata_url) {
            const metadata = await requestJson(installSpec.metadata_url, {}, true);
            payload = {
              ...payload,
              artifact_url: metadata.artifact_url || "",
              artifact_sha256: metadata.artifact_sha256 || "",
              artifact_signature: metadata.signature || "",
            };
          }
          await requestJson("/api/extensions/install", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          await load();
        } catch (error) {
          statusEl.textContent = error instanceof Error ? error.message : "Install failed";
        } finally {
          busyId = "";
        }
      }

      async function setEnabled(id, enabled) {
        busyId = id;
        statusEl.textContent = "Updating...";
        try {
          await requestJson(`/api/extensions/${encodeURIComponent(id)}/enabled`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ enabled }),
          });
          await load();
        } catch (error) {
          statusEl.textContent = error instanceof Error ? error.message : "Update failed";
        } finally {
          busyId = "";
        }
      }

      async function uninstall(item) {
        busyId = item.id;
        statusEl.textContent = `Uninstalling ${item.name || item.id}...`;
        try {
          await requestJson(`/api/extensions/ofek-dev.marketplace/backend/extensions/${encodeURIComponent(item.id)}/uninstall`, {
            method: "POST",
          }, true);
          await requestJson(`/api/extensions/${encodeURIComponent(item.id)}`, {
            method: "DELETE",
          });
          await load();
        } catch (error) {
          statusEl.textContent = error instanceof Error ? error.message : "Uninstall failed";
        } finally {
          busyId = "";
        }
      }

      refreshEl.addEventListener("click", () => {
        void load();
      });
      saveMarketplaceTokenEl.addEventListener("click", () => {
        const token = marketplaceTokenEl.value.trim();
        if (token) {
          window.localStorage.setItem(marketplaceTokenKey, token);
        }
        void load();
      });
      clearMarketplaceTokenEl.addEventListener("click", () => {
        window.localStorage.removeItem(marketplaceTokenKey);
        marketplaceTokenEl.value = "";
        void load();
      });
      void load();
    </script>
  </body>
</html>
