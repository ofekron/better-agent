<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Better Agent Marketplace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: dark;
        --ink: #0B0E14;
        --surface: #12161F;
        --surface-2: #171C27;
        --line: rgba(255, 255, 255, 0.09);
        --line-strong: rgba(255, 255, 255, 0.16);
        --text: #E7EAF0;
        --muted: #9AA3B4;
        --faint: #6C7688;
        --gold: #F4C95D;
        --cyan: #71D6FF;
        --ok: #33D6A6;
        --display: "Space Grotesk", ui-sans-serif, system-ui, -apple-system, sans-serif;
        --body: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
        --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
        font-family: var(--body);
        background: var(--ink);
        color: var(--text);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(60% 45% at 85% -8%, rgba(113, 214, 255, 0.12), transparent 60%),
          radial-gradient(50% 40% at 4% 0%, rgba(244, 201, 93, 0.10), transparent 58%),
          var(--ink);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }
      [hidden] { display: none !important; }
      main {
        max-width: 980px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }
      h1 {
        margin: 0;
        font-family: var(--display);
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      button {
        border: 1px solid var(--line-strong);
        border-radius: 9px;
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        font-family: var(--body);
        font-weight: 600;
        font-size: 14px;
        min-height: 36px;
        padding: 0 16px;
        cursor: pointer;
        transition: background-color 160ms ease, border-color 160ms ease, box-shadow 200ms ease, opacity 160ms ease, transform 160ms ease;
      }
      button:hover:not(:disabled) { transform: translateY(-1px); border-color: var(--cyan); }
      button.primary {
        color: #081018;
        background: linear-gradient(135deg, var(--gold), var(--cyan));
        border-color: transparent;
        box-shadow: 0 0 0 1px rgba(113, 214, 255, 0.25), 0 12px 30px rgba(20, 22, 28, 0.5);
      }
      button.primary:hover:not(:disabled) { box-shadow: 0 0 0 1px rgba(113, 214, 255, 0.5), 0 16px 40px rgba(20, 22, 28, 0.6); }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .status {
        min-height: 24px;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 13px;
        margin-bottom: 12px;
      }
      .grid {
        display: grid;
        gap: 12px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0));
        padding: 18px;
        animation: marketplace-enter 220ms ease both;
        transition: border-color 180ms ease, background 180ms ease;
      }
      .row:hover { border-color: var(--line-strong); background: linear-gradient(180deg, rgba(113,214,255,0.05), rgba(255,255,255,0)); }
      h2 {
        margin: 0 0 6px;
        font-family: var(--display);
        font-size: 17px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }
      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }
      .meta span {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 3px 9px;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.02em;
      }
      .actions {
        display: flex;
        gap: 8px;
      }
      .account-gate {
        display: grid;
        gap: 12px;
        border: 1px solid var(--line-strong);
        border-radius: 14px;
        background: linear-gradient(180deg, var(--surface-2), var(--surface));
        padding: 20px;
        margin-bottom: 16px;
        animation: marketplace-enter 220ms ease both;
      }
      .provider-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .token {
        width: min(360px, 100%);
        box-sizing: border-box;
        border: 1px solid var(--line-strong);
        border-radius: 9px;
        min-height: 36px;
        padding: 0 12px;
        background: var(--surface);
        color: var(--text);
        font-family: var(--body);
        font-size: 14px;
      }
      .token::placeholder { color: var(--faint); }
      button:focus-visible, .token:focus-visible, input:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }
      @media (max-width: 720px) {
        header,
        .row {
          grid-template-columns: 1fr;
          align-items: stretch;
        }
        header {
          display: grid;
        }
        .actions {
          justify-content: flex-start;
          flex-wrap: wrap;
        }
      }
      @keyframes marketplace-enter {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Marketplace</h1>
        <button id="refresh" type="button" disabled>Refresh</button>
      </header>
      <section id="accountGate" class="account-gate" hidden>
        <p>Sign in to browse and install marketplace extensions.</p>
        <div id="providerActions" class="provider-actions"></div>
      </section>
      <button id="marketplaceLogout" type="button" hidden>Sign out</button>
      <div id="status" class="status"></div>
      <div id="grid" class="grid"></div>
    </main>
    <script src="./catalog.js"></script>
    <script type="module">
      const { isMarketplaceManaged, marketplaceRows } = globalThis.marketplaceCatalog;
      const statusEl = document.getElementById("status");
      const gridEl = document.getElementById("grid");
      const refreshEl = document.getElementById("refresh");
      const accountGateEl = document.getElementById("accountGate");
      const providerActionsEl = document.getElementById("providerActions");
      const marketplaceLogoutEl = document.getElementById("marketplaceLogout");
      let busyId = "";
      let bridgeNonce = "";
      const pendingRequests = new Map();

      async function requestJson(url, options = {}) {
        if (!bridgeNonce) throw new Error("Marketplace connection is not ready");
        const requestId = crypto.randomUUID();
        const body = typeof options.body === "string" ? JSON.parse(options.body) : options.body;
        const result = new Promise((resolve, reject) => {
          pendingRequests.set(requestId, { resolve, reject, raw: false });
        });
        window.parent.postMessage({
          source: "ba-extension",
          nonce: bridgeNonce,
          action: "marketplace-request",
          requestId,
          path: url,
          method: options.method || "GET",
          body,
        }, "*");
        return result;
      }

      async function requestAction(action, payload = {}) {
        if (!bridgeNonce) throw new Error("Marketplace connection is not ready");
        const requestId = crypto.randomUUID();
        const result = new Promise((resolve, reject) => {
          pendingRequests.set(requestId, { resolve, reject, raw: true });
        });
        window.parent.postMessage({
          source: "ba-extension",
          nonce: bridgeNonce,
          action,
          requestId,
          ...payload,
        }, "*");
        return result;
      }

      function installedById(records) {
        const map = new Map();
        for (const record of records) {
          const id = record?.manifest?.id;
          if (id) map.set(id, record);
        }
        return map;
      }

      function describeStatus(record) {
        if (!record) return "Available";
        return record.enabled ? "Installed" : "Disabled";
      }

      function renderAccountGate(providers) {
        providerActionsEl.replaceChildren();
        for (const provider of providers) {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = `Continue with ${provider.label}`;
          button.addEventListener("click", () => {
            if (!bridgeNonce) return;
            statusEl.textContent = `Opening ${provider.label} sign-in...`;
            window.parent.postMessage({
              source: "ba-extension",
              nonce: bridgeNonce,
              action: "marketplace-auth-start",
              requestId: crypto.randomUUID(),
              provider: provider.id,
            }, "*");
          });
          providerActionsEl.appendChild(button);
        }
      }

      function render(catalog, installed) {
        const installedMap = installedById(installed);
        const rows = marketplaceRows(catalog, installed);
        gridEl.replaceChildren();
        for (const item of rows) {
          const record = installedMap.get(item.id);
          const marketplaceManaged = isMarketplaceManaged(record);
          const row = document.createElement("article");
          row.className = "row";
          const info = document.createElement("div");
          const title = document.createElement("h2");
          title.textContent = item.name || item.id;
          const description = document.createElement("p");
          description.textContent = item.description || item.id;
          const meta = document.createElement("div");
          meta.className = "meta";
          for (const value of [
            item.version,
            describeStatus(record),
            item.marketplace?.subscription_required ? "Subscription" : "Included",
            ...(item.surfaces || []),
          ].filter(Boolean)) {
            const pill = document.createElement("span");
            pill.textContent = value;
            meta.appendChild(pill);
          }
          info.append(title, description, meta);
          const actions = document.createElement("div");
          actions.className = "actions";
          if (item.marketplace?.subscription_required && !record) {
            const token = document.createElement("input");
            token.className = "token";
            token.type = "password";
            token.placeholder = "Entitlement token";
            token.autocomplete = "off";
            actions.appendChild(token);
          }
          const button = document.createElement("button");
          button.type = "button";
          button.className = record ? "" : "primary";
          button.disabled = busyId === item.id || item.id === "ofek-dev.marketplace" || Boolean(record && !marketplaceManaged);
          button.textContent = record
            ? (marketplaceManaged ? (record.enabled ? "Disable" : "Enable") : "Installed")
            : "Install";
          button.addEventListener("click", () => {
            if (record) {
              void setEnabled(item.id, !record.enabled);
              return;
            }
            const token = actions.querySelector("input")?.value || "";
            void install(item, token);
          });
          actions.appendChild(button);
          if (record && marketplaceManaged && item.id !== "ofek-dev.marketplace") {
            const uninstallButton = document.createElement("button");
            uninstallButton.type = "button";
            uninstallButton.disabled = busyId === item.id;
            uninstallButton.textContent = "Uninstall";
            uninstallButton.addEventListener("click", () => {
              void uninstall(item);
            });
            actions.appendChild(uninstallButton);
          }
          row.append(info, actions);
          gridEl.appendChild(row);
        }
      }

      async function load() {
        statusEl.textContent = "Loading...";
        let installed = [];
        try {
          const [authPayload, authStatus, installedPayload] = await Promise.all([
            requestJson("/api/extensions/ofek-dev.marketplace/backend/auth/providers"),
            requestJson("/api/extensions/ofek-dev.marketplace/backend/auth/status"),
            requestJson("/api/extensions"),
          ]);
          installed = installedPayload.extensions || [];
          renderAccountGate(authPayload.providers || []);
          accountGateEl.hidden = authStatus.authenticated === true;
          marketplaceLogoutEl.hidden = authStatus.authenticated !== true;
          if (authStatus.authenticated !== true) {
            render([], installed);
            statusEl.textContent = "Sign in with Google or GitHub to continue.";
            return;
          }
          const catalogPayload = await requestJson("/api/extensions/ofek-dev.marketplace/backend/catalog");
          render(catalogPayload.extensions || [], installed);
          statusEl.textContent = "";
        } catch (error) {
          render([], installed);
          accountGateEl.hidden = false;
          marketplaceLogoutEl.hidden = true;
          statusEl.textContent = error instanceof Error ? error.message : "Marketplace catalog failed";
        }
      }

      async function install(item, entitlementToken) {
        busyId = item.id;
        statusEl.textContent = `Installing ${item.name || item.id}...`;
        try {
          const result = await requestAction("marketplace-install", {
            extensionId: item.id,
            entitlementToken,
          });
          if (result.status === "cancelled") {
            statusEl.textContent = "";
            return;
          }
          await load();
        } catch (error) {
          statusEl.textContent = error instanceof Error ? error.message : "Install failed";
        } finally {
          busyId = "";
        }
      }

      async function setEnabled(id, enabled) {
        busyId = id;
        statusEl.textContent = "Updating...";
        try {
          await requestAction("marketplace-set-enabled", {
            extensionId: id,
            enabled,
          });
          await load();
        } catch (error) {
          statusEl.textContent = error instanceof Error ? error.message : "Update failed";
        } finally {
          busyId = "";
        }
      }

      async function uninstall(item) {
        busyId = item.id;
        statusEl.textContent = `Uninstalling ${item.name || item.id}...`;
        try {
          await requestAction("marketplace-uninstall", {
            extensionId: item.id,
          });
          await load();
        } catch (error) {
          statusEl.textContent = error instanceof Error ? error.message : "Uninstall failed";
        } finally {
          busyId = "";
        }
      }

      refreshEl.addEventListener("click", () => {
        void load();
      });
      marketplaceLogoutEl.addEventListener("click", async () => {
        statusEl.textContent = "Signing out...";
        await requestJson("/api/extensions/ofek-dev.marketplace/backend/auth/logout", { method: "POST" });
        await load();
      });
      window.addEventListener("message", (event) => {
        if (event.source !== window.parent || event.data?.source !== "ba-core") return;
        if (event.data.action === "marketplace-auth-init" && typeof event.data.nonce === "string") {
          bridgeNonce = event.data.nonce;
          refreshEl.disabled = false;
          void load();
          return;
        }
        if (event.data.nonce === bridgeNonce && typeof event.data.requestId === "string") {
          const pending = pendingRequests.get(event.data.requestId);
          if (!pending) return;
          pendingRequests.delete(event.data.requestId);
          if (event.data.ok === false || event.data.status === "failed") {
            pending.reject(new Error(event.data.error || "Marketplace request failed"));
          } else {
            pending.resolve(pending.raw ? event.data : event.data.payload);
          }
          return;
        }
        if (event.data.nonce !== bridgeNonce || event.data.action !== "marketplace-auth-result") return;
        statusEl.textContent = event.data.status === "cancelled" ? "Sign-in cancelled." : "Sign-in complete.";
        if (event.data.status === "authenticated") void load();
      });
    </script>
  </body>
</html>
